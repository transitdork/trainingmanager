<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0B0E1A;--bg2:#0F1422;
  --surface:rgba(255,255,255,0.045);--surface2:rgba(255,255,255,0.085);--surface3:rgba(255,255,255,0.13);
  --teal:#38BDF8;--teal-l:#7DDBFC;--teal-d:#0369A1;--teal-glow:rgba(56,189,248,0.3);--teal-bg:rgba(56,189,248,0.1);
  --green:#22C55E;--green-l:#4ADE80;--green-glow:rgba(34,197,94,0.32);
  --red:#EF4444;--red-bg:rgba(239,68,68,0.08);--red-border:rgba(239,68,68,0.4);
  --gold:#F59E0B;--gold-bg:rgba(245,158,11,0.12);
  --purple:#A78BFA;--orange:#F97316;
  --text:#E8EAF6;--muted:rgba(232,234,246,0.42);--muted2:rgba(232,234,246,0.22);
  --border:rgba(56,189,248,0.22);--border-l:rgba(255,255,255,0.065);
  --r:14px;--r-sm:9px;
}
html{background:var(--bg);}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
#root{display:flex;flex-direction:column;min-height:100svh;width:100%;}
.app{width:100%;min-height:100svh;display:flex;flex-direction:column;background:linear-gradient(160deg,#111827 0%,var(--bg) 60%);position:relative;overflow:hidden;}
.orb1{position:fixed;top:-100px;right:-70px;width:320px;height:320px;background:radial-gradient(circle,rgba(56,189,248,0.1) 0%,transparent 70%);pointer-events:none;z-index:0;}
.orb2{position:fixed;bottom:30px;left:-110px;width:360px;height:360px;background:radial-gradient(circle,rgba(167,139,250,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
.screen{flex:1;overflow-y:auto;padding-bottom:96px;position:relative;z-index:1;}
.screen-inner{padding-bottom:24px;}
.hdr{display:flex;align-items:center;gap:12px;padding:52px 20px 14px;position:relative;z-index:2;}
.hdr-logo{font-size:28px;line-height:1;flex-shrink:0;}
.hdr-titles{flex:1;min-width:0;}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,var(--teal-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.hdr-sub{font-size:11px;color:var(--muted);letter-spacing:0.3px;margin-top:1px;}
.btn-back{width:38px;height:38px;border-radius:11px;background:var(--surface);border:1px solid var(--border-l);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.2s;flex-shrink:0;}
.btn-back:hover{background:var(--surface2);}
.sect{padding:0 20px;margin-bottom:20px;}
.sect-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10.5px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal);margin-bottom:11px;display:flex;align-items:center;gap:10px;}
.sect-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}
.card{background:var(--surface);border:1px solid var(--border-l);border-radius:var(--r);padding:16px;transition:all 0.18s;}
.card+.card{margin-top:10px;}
.card:hover{background:var(--surface2);}
.card-clickable{cursor:pointer;}
.card-clickable:hover{border-color:rgba(56,189,248,0.35);transform:translateX(2px);}
.team-card{display:flex;align-items:center;gap:14px;}
.team-badge{width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,rgba(56,189,248,0.18),rgba(167,139,250,0.1));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;color:var(--teal);flex-shrink:0;}
.team-info{flex:1;min-width:0;}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.team-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.team-count{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--teal);line-height:1;text-align:center;}
.team-count-lbl{font-size:9px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;text-align:center;}
.team-arr{color:var(--muted);font-size:18px;}
.action-row{display:flex;gap:10px;padding:0 20px;margin-bottom:22px;}
.action-btn{flex:1;display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--surface);border:1px solid var(--border-l);border-radius:var(--r);cursor:pointer;transition:all 0.2s;color:var(--text);}
.action-btn:hover{background:var(--surface2);border-color:var(--border);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;}
.action-icon{font-size:20px;flex-shrink:0;}
.action-lbl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;}
.action-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;height:48px;border-radius:12px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,var(--teal-l),var(--teal-d));color:#fff;box-shadow:0 4px 18px var(--teal-glow);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 26px rgba(56,189,248,0.45);}
.btn-primary:active{transform:translateY(0);}
.btn-saved{background:linear-gradient(135deg,var(--green-l),#15803D);color:#fff;box-shadow:0 4px 18px var(--green-glow);}
.btn-saved:hover{transform:translateY(-1px);}
.btn-gold{background:linear-gradient(135deg,#FCD34D,#D97706);color:#1A0E00;box-shadow:0 4px 18px rgba(245,158,11,0.35);}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 26px rgba(245,158,11,0.5);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border-l);}
.btn-secondary:hover{background:var(--surface3);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid transparent;font-size:13px;height:36px;}
.btn-ghost:hover{color:var(--text);background:var(--surface);border-color:var(--border-l);}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{flex:1;}
.hero{padding:4px 20px 22px;}
.hero-greeting{font-size:13px;color:var(--muted);margin-bottom:3px;}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;line-height:1.05;}
.hero-teal{color:var(--teal);}
.date-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border-l);border-radius:var(--r-sm);margin:0 20px 18px;}
.date-lbl{font-size:13px;color:var(--muted);font-weight:500;}
input[type='date']{background:none;border:none;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-left:auto;color-scheme:dark;outline:none;}
.att-stats{display:flex;gap:10px;padding:0 20px;margin-bottom:18px;}
.att-stat{flex:1;background:var(--surface);border:1px solid var(--border-l);border-radius:var(--r-sm);padding:12px 8px;text-align:center;}
.att-num{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--teal);line-height:1;}
.att-num.absent{color:var(--muted);}
.att-num.total{color:var(--purple);}
.att-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}
.player-row{display:flex;align-items:center;gap:14px;padding:11px 14px;background:var(--surface);border:1px solid var(--border-l);border-radius:var(--r-sm);cursor:pointer;transition:all 0.15s;margin-bottom:7px;}
.player-row.present{border-color:rgba(56,189,248,0.32);background:rgba(56,189,248,0.06);}
.player-row.absent{opacity:0.38;}
.player-row:hover{background:var(--surface2);}

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const POSITIONS = {0:'—',1:'PG',2:'SG',3:'SF',4:'PF',5:'C'};
const SKILL_KEYS = ['speed','energy','layup','jumpshot','three','foulshot','passing','receiving','dribble','dribblepressure','sharing','defplayer','defset','offdef','reboff','rebdef','setplays','composure'];
const MODES = [{id:'random',label:'Random'},{id:'samePos',label:'Same Pos'},{id:'diffPos',label:'Vary Pos'},{id:'sameSkill',label:'Similar'},{id:'mixSkill',label:'Mixed'}];
const ALL_CONFIGS = [{id:'all2',label:'Pairs',sub:'×2',full:'Groups of 2',size:2},{id:'all3',label:'Trios',sub:'×3',full:'Groups of 3',size:3},{id:'all4',label:'Fours',sub:'×4',full:'Groups of 4',size:4}];
const NUM_CONFIGS = [{id:'num2',label:'2',sub:'Groups',full:'2 Groups'},{id:'num3',label:'3',sub:'Groups',full:'3 Groups'},{id:'num4',label:'4',sub:'Groups',full:'4 Groups'}];
const ONE_CONFIGS = [{id:'one2',label:'2',sub:'pair',full:'One Pair',size:2},{id:'one3',label:'3',sub:'trio',full:'One Trio',size:3},{id:'one4',label:'4',sub:'group',full:'Group of 4',size:4},{id:'one5',label:'5',sub:'group',full:'Group of 5',size:5},{id:'one6',label:'6',sub:'group',full:'Group of 6',size:6}];
const ALL_CFGS = [...ALL_CONFIGS,...NUM_CONFIGS,...ONE_CONFIGS];
const CHIP_COLORS = ['#38BDF8','#A78BFA','#34D399','#F472B6','#FBBF24','#60A5FA','#4ADE80','#FB923C','#E879F9','#2DD4BF'];
const GROUP_COLORS = ['rgba(56,189,248,0.9)','rgba(167,139,250,0.9)','rgba(52,211,153,0.9)','rgba(244,114,182,0.9)','rgba(251,191,36,0.9)','rgba(45,212,191,0.9)'];
const TEAM_COLS = [['#38BDF8','rgba(56,189,248,0.1)','rgba(56,189,248,0.4)'],['#F472B6','rgba(244,114,182,0.1)','rgba(244,114,182,0.4)']];

function uid() { return Math.random().toString(36).slice(2,10); }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function calcOverall(r) {
  if (!r) return null;
  const vals = SKILL_KEYS.map(k=>r[k]).filter(v=>typeof v==='number');
  return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10 : null;
}
function shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); }
function divideAll(arr, size) {
  if (!arr.length) return [];
  const a=[...arr], groups=[];
  if (size===2) {
    while (a.length) {
      if (a.length===1) { groups.length ? groups[groups.length-1].push(a.pop()) : groups.push(a.splice(0)); break; }
      if (a.length===3) { groups.push(a.splice(0,3)); break; }
      groups.push(a.splice(0,2));
    }
  } else if (size===3) {
    const rem=a.length%3;
    if (rem===1&&a.length>=4) groups.push(a.splice(0,4));
    else if (rem===2) groups.push(a.splice(0,2));
    while (a.length>=3) groups.push(a.splice(0,3));
    if (a.length) groups.push(a.splice(0));
  } else if (size===4) {
    const rem=a.length%4;
    if (rem===1&&a.length>=5) groups.push(a.splice(0,5));
    else if (rem===2&&a.length>=6) { groups.push(a.splice(0,3)); groups.push(a.splice(0,3)); }
    else if (rem===3) groups.push(a.splice(0,3));
    while (a.length>=4) groups.push(a.splice(0,4));
    if (a.length) groups.push(a.splice(0));
  }
  return groups.filter(g=>g.length);
}
function divideIntoN(arr, n) {
  if (!arr.length||n<1) return [];
  const a=shuffle(arr), groups=Array.from({length:n},()=>[]);
  a.forEach((p,i)=>groups[i%n].push(p));
  return groups.filter(g=>g.length);
}
function arrangePlayers(players, mode, ratings, teamId) {
  const r=p=>ratings&&ratings[teamId+'_'+p.id];
  const pos=p=>(r(p)||{}).position||0;
  const skill=p=>calcOverall(r(p))!=null?calcOverall(r(p)):5;
  const arr=[...players];
  if (mode==='random') return arr.sort(()=>Math.random()-0.5);
  if (mode==='samePos') return arr.sort((a,b)=>pos(a)-pos(b));
  if (mode==='sameSkill') return arr.sort((a,b)=>skill(a)-skill(b));
  if (mode==='diffPos') {
    const byPos={};
    arr.forEach(p=>{ const k=pos(p); if(!byPos[k]) byPos[k]=[]; byPos[k].push(p); });
    Object.values(byPos).forEach(g=>g.sort(()=>Math.random()-0.5));
    const keys=Object.keys(byPos).sort(), result=[];
    let i=0, added=true;
    while (result.length<arr.length&&added) {
      added=false;
      for (const k of keys) { if (i<byPos[k].length) { result.push(byPos[k][i]); added=true; } }
      i++;
    }
    return result;
  }
  if (mode==='mixSkill') {
    arr.sort((a,b)=>skill(b)-skill(a));
    const result=[]; let lo=arr.length-1, hi=0;
    while (hi<=lo) { result.push(arr[hi++]); if (hi<=lo) result.push(arr[lo--]); }
    return result;
  }
  return arr;
}
function makeGroups(players, config, mode, ratings, teamId) {
  if (config.startsWith('num')) return divideIntoN(arrangePlayers(players,mode,ratings,teamId), parseInt(config.replace('num','')));
  const arranged=arrangePlayers(players, mode, ratings, teamId);
  if (config.startsWith('one')) return [arranged.slice(0, Math.min(parseInt(config.replace('one','')), arranged.length))];

// ── Swipeable history row ──────────────────────────────────────────────────────
function SwipeRow({ team, date, ids, count, onDelete }) {
  const [dx, setDx] = useState(0);
  const [open, setOpen] = useState(false);
  const startX = useRef(null);
  const SNAP = 80, FULL = 200;
  const d = new Date(date+'T12:00:00');
  const names = ids.map(id => { const p=team.players.find(p=>p.id===id); return p ? (p.nickname||p.firstName) : '?'; }).join(', ');

  function ts(e) { startX.current = e.touches[0].clientX; }
  function tm(e) {
    if (startX.current===null) return;
    const delta = startX.current - e.touches[0].clientX;
    if (delta > 0) setDx(Math.min(delta, FULL+30));
  }
  function te() {
    if (dx >= FULL) { onDelete(); return; }
    if (dx >= SNAP) { setOpen(true); setDx(SNAP); }
    else { setOpen(false); setDx(0); }
    startX.current = null;
  }
  function handleCardClick() { if (open) { setOpen(false); setDx(0); } }

  const tx = open && startX.current===null ? SNAP : dx;

  return (
    <div className="hist-swipe-outer">
      <div className="hist-delete-reveal" onClick={onDelete}><div className="hist-delete-lbl">Delete</div></div>
      <div className="hist-slider" style={{transform:'translateX(-'+tx+'px)', transition: startX.current ? 'none' : 'transform 0.25s ease'}}
        onTouchStart={ts} onTouchMove={tm} onTouchEnd={te} onClick={handleCardClick}>
        <div className="hist-card">
          <div className="hist-date-box">
            <div className="h-day">{d.getDate()}</div>

            <div className="hist-wd">{d.toLocaleString('en-AU',{weekday:'long',year:'numeric'})}</div>

          <div><div className="hist-count">{count}</div><div className="hist-count-lbl">Present</div></div>
        </div>
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab] = useState('teams');
  const [screen,setScreen] = useState('home');
  const [teams,setTeams] = useState(()=>LS.get('tm_teams')||[]);
  const [ratings,setRatings] = useState(()=>LS.get('tm_ratings')||{});
  const [sessions,setSessions] = useState(()=>LS.get('tm_sessions')||{});
  const [selTeam,setSelTeam] = useState(null);
  const [sessionDate,setSessionDate] = useState(todayStr());
  const [attendees,setAttendees] = useState(new Set());
  const [isSaved,setIsSaved] = useState(false);
  const [groups,setGroups] = useState([]);
  const [groupConfig,setGroupConfig] = useState('all2');
  const [groupMode,setGroupMode] = useState('random');
  const [toast,setToast] = useState(null);
  const [showCreate,setShowCreate] = useState(false);
  const [newTeam,setNewTeam] = useState({club:'',league:'',season:'',ageBracket:'',year:String(new Date().getFullYear()),players:[]});
  const [npName,setNpName] = useState('');
  const [npNum,setNpNum] = useState('');
  const [gcTeams,setGcTeams] = useState([]);
  const [gcDraw,setGcDraw] = useState(null);
  const [timerSecs,setTimerSecs] = useState(null);   // null = no timer open
  const [timerLeft,setTimerLeft] = useState(0);
  const [timerRunning,setTimerRunning] = useState(false);
  const [timerAnnounce,setTimerAnnounce] = useState('');
  const timerRef = useRef(null);
  const spokenRef = useRef(new Set());
  const importRef = useRef(null);
  const backupRef  = useRef(null);
  const groupsRef  = useRef(null);

  const saveTeams = t => { setTeams(t); LS.set('tm_teams',t); };
  const saveRatings = r => { setRatings(r); LS.set('tm_ratings',r); };
  const saveSess = s => { setSessions(s); LS.set('tm_sessions',s); };
  const toast_ = msg => { setToast(msg); setTimeout(()=>setToast(null),3000); };

  function onImport(e) {
    const f=e.target.files[0]; if (!f) return; e.target.value='';
    const fr=new FileReader();
    fr.onload = ev => {
      try {
        const data=JSON.parse(ev.target.result);
        if (!data._squadmgr) throw new Error();
        const next=[...teams];
        (data.teams||[]).forEach(team=>{ const i=next.findIndex(t=>t.id===team.id); if(i>=0) next[i]=team; else next.push(team); });
        saveTeams(next);
        if (data.ratings) saveRatings(Object.assign({},ratings,data.ratings));
        toast_('✓ Imported '+(data.teams||[]).length+' team(s)');
      } catch(e) { toast_('⚠ Invalid Squad Manager file'); }
    };
    fr.readAsText(f);
  }

  function onExport() {
    const blob=new Blob([JSON.stringify({_squadmgr:true,version:2,teams,ratings},null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='squad-manager-teams-'+todayStr()+'.json'; a.click();
    URL.revokeObjectURL(url);
    toast_('✓ Exported to Squad Manager format');
  }

  function exportBackup() {
    const data = {
      _tmbackup: true,
      version: 1,
      exported: new Date().toISOString(),
      teams,
      ratings,
      sessions,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'training-manager-backup-' + todayStr() + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast_('✓ Backup saved — keep this file safe!');
  }

  function onImportBackup(e) {
    const f = e.target.files[0]; if (!f) return; e.target.value = '';
    const fr = new FileReader();
    fr.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data._tmbackup) throw new Error('Not a Training Manager backup');
        if (data.teams)    saveTeams(data.teams);
        if (data.ratings)  saveRatings(data.ratings);
        if (data.sessions) saveSess(data.sessions);
        const sessCount = Object.values(data.sessions || {}).reduce((acc, t) => acc + Object.keys(t).length, 0);
        toast_('✓ Restored ' + (data.teams||[]).length + ' team(s) and ' + sessCount + ' session(s)');
      } catch(err) {
        toast_('⚠ Invalid backup file');
      }
    };
    fr.readAsText(f);
  }

  function addPlayer() {
    if (!npName.trim()) return;
    const parts=npName.trim().split(' ');
    const p={id:uid(),firstName:parts[0],lastName:parts.slice(1).join(' '),nickname:parts[0],singletNumber:npNum.trim()||'0'};
    setNewTeam(t=>Object.assign({},t,{players:[...t.players,p]}));
    setNpName(''); setNpNum('');
  }
  function createTeam() {
    if (!newTeam.club.trim()) { toast_('⚠ Team name required'); return; }
    saveTeams([...teams,Object.assign({},newTeam,{id:uid()})]);
    setShowCreate(false);
    setNewTeam({club:'',league:'',season:'',ageBracket:'',year:String(new Date().getFullYear()),players:[]});
    toast_('✓ Team created');
  }

  function openSession(team) {
    setSelTeam(team);
    const date=todayStr(); setSessionDate(date);
    const prev=(sessions[team.id]||{})[date];
    setAttendees(prev ? new Set(prev) : new Set(team.players.map(p=>p.id)));
    setIsSaved(!!prev);
    setGroups([]); setGroupConfig('all2'); setGroupMode('random');
    setScreen('session');
  }
  function changeDate(date) {
    setSessionDate(date);
    const prev=((sessions[selTeam&&selTeam.id])||{})[date];
    setAttendees(prev ? new Set(prev) : new Set((selTeam&&selTeam.players||[]).map(p=>p.id)));
    setIsSaved(!!prev);
  }
  function togglePlayer(id) { setAttendees(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; }); setIsSaved(false); }
  function markAll(v) { setAttendees(v ? new Set(selTeam.players.map(p=>p.id)) : new Set()); setIsSaved(false); }
  function saveAtt() {
    const ns=Object.assign({},sessions);
    if (!ns[selTeam.id]) ns[selTeam.id]={};
    ns[selTeam.id][sessionDate]=[...attendees];
    saveSess(ns); setIsSaved(true); toast_('✓ Attendance saved');
  }
  function deleteSess(teamId, date) {
    const ns=Object.assign({},sessions);
    if (ns[teamId]) { delete ns[teamId][date]; if (!Object.keys(ns[teamId]).length) delete ns[teamId]; }
    saveSess(ns); toast_('✓ Session deleted');
  }

  function goGroups() {
    if (attendees.size<2) { toast_('⚠ Need at least 2 players'); return; }
    setGroups([]); setGroupConfig('all2'); setGroupMode('random');
    setScreen('groups');
    setTimeout(()=>groupsRef.current&&groupsRef.current.scrollTo({top:0,behavior:'instant'}),30);
  }
  function genGroups(cfg, mode) {
    cfg=cfg||groupConfig; mode=mode||groupMode;
    const present=selTeam.players.filter(p=>attendees.has(p.id));
    if (present.length<2) { toast_('⚠ Need at least 2 players'); return; }
    setGroups(makeGroups(present,cfg,mode,ratings,selTeam.id));
  }
  function onCfgChange(cfg) { setGroupConfig(cfg); if (groups.length) genGroups(cfg,groupMode); }
  function onModeChange(mode) { setGroupMode(mode); if (groups.length) genGroups(groupConfig,mode); }

  function goGoldenChild() {
    const present=selTeam.players.filter(p=>attendees.has(p.id));
    if (present.length<2) { toast_('⚠ Need at least 2 players'); return; }
    const s=shuffle(present);
    const splitAt=Math.ceil(s.length/2);
    setGcTeams([s.slice(0,splitAt), s.slice(splitAt)]);
    setGcDraw(null);
    setScreen('golden');
  }
  function gcDraw_() {
    const maxNum=Math.max(gcTeams[0].length, gcTeams[1].length);
    const count=Math.ceil(Math.random()*maxNum);
    const pool=Array.from({length:maxNum},(_,i)=>i+1);
    const drawn=shuffle(pool).slice(0,count).sort((a,b)=>a-b);
    setGcDraw(drawn);
  }

  // ── Timer constants ───────────────────────────────────────────────────────────
  const TIMER_ANNOUNCEMENTS = {
    30:  [20],
    45:  [30,20],
    60:  [30,20],
    120: [60,30,20],
    180: [120,60,30,20],
    300: [180,120,60,30,20],
  };
  const TIMER_LABELS = {30:'30 Secs',45:'45 Secs',60:'1 Min',120:'2 Mins',180:'3 Mins',300:'5 Mins'};

  // ── Web Audio (beeps — uses media channel so works even on silent mode) ────────
  const audioCtxRef = React.useRef(null);

  function getAudioCtx() {
    if (!audioCtxRef.current) {
      try { audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { return null; }
    }
    // Resume if suspended (required after iOS gesture unlock)
    if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
    return audioCtxRef.current;
  }

  // Play a single beep: freq Hz, duration ms, volume 0-1, waveform type
  function beep(freq, duration, vol, type) {
    const ctx = getAudioCtx(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    // Slight pitch rise for drama
    osc.frequency.linearRampToValueAtTime(freq * 1.02, ctx.currentTime + duration/1000);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration/1000);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration/1000 + 0.05);
  }

  // Countdown beep — pitch escalates as seconds count down (10→1)
  // sec 10 = 440Hz, sec 1 = 880Hz, rising linearly
  function countdownBeep(secsLeft) {
    const ctx = getAudioCtx(); if (!ctx) return;
    // Map 10..1 → 440..900 Hz
    const freq = 440 + (10 - secsLeft) * 51;
    const vol  = 0.35 + (10 - secsLeft) * 0.025; // gets slightly louder too
    const dur  = secsLeft <= 3 ? 180 : 120;
    beep(freq, dur, Math.min(vol, 0.7), 'triangle');
  }

  // Triumphant finish fanfare — ascending chord sequence
  function finishFanfare() {
    const ctx = getAudioCtx(); if (!ctx) return;
    const t = ctx.currentTime;
    // Notes: C5, E5, G5, C6 — quick staccato then held chord
    [[523,0],[659,0.12],[784,0.24],[1047,0.36]].forEach(([f,delay])=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0, t+delay);
      gain.gain.linearRampToValueAtTime(0.45, t+delay+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t+delay+0.6);
      osc.start(t+delay); osc.stop(t+delay+0.7);
    });
    // Sustain top note
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.type = 'sine'; osc2.frequency.value = 1047;
    gain2.gain.setValueAtTime(0, t+0.5);
    gain2.gain.linearRampToValueAtTime(0.3, t+0.55);
    gain2.gain.exponentialRampToValueAtTime(0.001, t+1.6);
    osc2.start(t+0.5); osc2.stop(t+1.7);
  }

  // Milestone alert tone — two quick ascending pips before the speech
  function milestonePip() {
    const ctx = getAudioCtx(); if (!ctx) return;
    beep(880, 80, 0.3, 'sine');
    setTimeout(()=>beep(1100, 100, 0.35, 'sine'), 110);
  }

  // ── Speech ────────────────────────────────────────────────────────────────────
  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.88; u.pitch = 1.05; u.volume = 1;
    const voices = window.speechSynthesis.getVoices();
    const pick = voices.find(v=>v.name==='Siri') ||
                 voices.find(v=>v.name.includes('Siri')) ||
                 voices.find(v=>v.name==='Karen') ||
                 voices.find(v=>v.name==='Samantha') ||
                 voices.find(v=>v.name.includes('Karen')) ||
                 voices.find(v=>v.lang==='en-AU'&&v.localService) ||
                 voices.find(v=>v.lang==='en-AU') ||
                 voices.find(v=>v.lang.startsWith('en')&&v.localService) ||
                 voices.find(v=>v.lang.startsWith('en'));
    if (pick) u.voice = pick;
    window.speechSynthesis.speak(u);
  }

  // More expressive milestone text
  function announceText(secsLeft, totalSecs) {
    if (secsLeft===0)   return 'Finish!';
    if (secsLeft===20)  return 'Last 20!';
    if (secsLeft===30)  return totalSecs===30 ? 'Halfway!' : 'Last 30!';
    if (secsLeft===60)  return totalSecs===60 ? 'Halfway!' : 'One minute left!';
    if (secsLeft===120) return totalSecs===120 ? 'Halfway!' : '2 minutes left!';
    if (secsLeft===180) return '3 minutes left!';
    return null;
  }

  // Prime both audio context AND speech on first gesture (iOS requires both)
  const audioPrimedRef = React.useRef(false);
  function primeAudio() {
    if (audioPrimedRef.current) return;
    audioPrimedRef.current = true;
    // Unlock Web Audio
    const ctx = getAudioCtx();
    if (ctx) {
      const osc = ctx.createOscillator();
      const g = ctx.createGain(); g.gain.value = 0;
      osc.connect(g); g.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.001);
    }
    // Unlock speech
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance(' ');
      u.volume = 0;
      window.speechSynthesis.speak(u);
      window.speechSynthesis.getVoices();
    }
  }

  function fmtTime(s) {
    const m=Math.floor(s/60), sec=s%60;
    return m>0 ? m+':'+(sec<10?'0':'')+sec : ''+s;
  }

  function openTimer(secs) {
    primeAudio(); // unlock Web Audio + Speech on this gesture
    if (timerRef.current) clearInterval(timerRef.current);
    spokenRef.current = new Set();
    setTimerSecs(secs);
    setTimerLeft(secs);
    setTimerAnnounce('');
    if (window.speechSynthesis) {
      const vv = window.speechSynthesis.getVoices();
      if (vv.length === 0) {
        window.speechSynthesis.onvoiceschanged = () => {
          window.speechSynthesis.onvoiceschanged = null;
          setTimerRunning(true);
        };
        setTimeout(() => setTimerRunning(true), 300);
      } else {
        setTimerRunning(true);
      }
    } else {
      setTimerRunning(true);
    }
  }

  function closeTimer() {
    if (timerRef.current) clearInterval(timerRef.current);
    setTimerSecs(null); setTimerRunning(false); setTimerAnnounce('');
    if (window.speechSynthesis) window.speechSynthesis.cancel();
  }

  function restartTimer() {
    if (timerRef.current) clearInterval(timerRef.current);
    spokenRef.current = new Set();
    setTimerLeft(timerSecs);
    setTimerAnnounce('');
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    setTimeout(() => setTimerRunning(true), 100);
  }

  // Keep iOS speech alive every 5s
  const iosSpeechKeepAlive = React.useRef(null);
  useEffect(()=>{
    if (timerRunning && window.speechSynthesis) {
      iosSpeechKeepAlive.current = setInterval(()=>{
        if (window.speechSynthesis.paused) window.speechSynthesis.resume();
      }, 5000);
    } else {
      if (iosSpeechKeepAlive.current) clearInterval(iosSpeechKeepAlive.current);
    }
    return ()=>{ if(iosSpeechKeepAlive.current) clearInterval(iosSpeechKeepAlive.current); };
  }, [timerRunning]);

  useEffect(()=>{
    if (!timerRunning) { if(timerRef.current) clearInterval(timerRef.current); return; }
    timerRef.current = setInterval(()=>{
      setTimerLeft(prev=>{
        const next = prev - 1;
        const announcements = TIMER_ANNOUNCEMENTS[timerSecs] || [];
        const isMilestone = announcements.includes(next);
        const isCountdown = next <= 10 && next > 0;
        const isDone = next === 0;

        if (!spokenRef.current.has(next)) {
          spokenRef.current.add(next);

          if (isCountdown) {
            // Escalating beep — no speech for countdown, just beeps
            countdownBeep(next);
            setTimerAnnounce(''+next);
            setTimeout(()=>setTimerAnnounce(a=>a===''+next?'':a), 850);
          }

          if (isMilestone) {
            // Two-pip alert then speech
            milestonePip();
            const txt = announceText(next, timerSecs);
            if (txt) {
              setTimeout(()=>{ speak(txt); }, 250);
              setTimerAnnounce(txt);
              setTimeout(()=>setTimerAnnounce(a=>a===txt?'':a), 2500);
            }
          }

          if (isDone) {
            finishFanfare();
            setTimeout(()=>speak('Finish!'), 400);
            setTimeout(()=>{
              setTimerRunning(false);
              clearInterval(timerRef.current);
              setTimerAnnounce('Finished!');
            }, 100);
            setTimeout(()=>closeTimer(), 2800);
          }
        }
        return next;
      });
    }, 1000);
    return ()=>clearInterval(timerRef.current);
  }, [timerRunning, timerSecs]);

  const pPos=(p,team)=>{ const r=ratings&&ratings[(team&&team.id||'')+'_'+p.id]; return r ? (POSITIONS[r.position]||'—') : '—'; };
  const pOvr=(p,team)=>calcOverall(ratings&&ratings[(team&&team.id||'')+'_'+p.id]);

  function teamHist(team) {
    if (!team||!sessions[team.id]) return [];
    return Object.entries(sessions[team.id]).map(([date,ids])=>({date,ids,count:ids.length})).sort((a,b)=>b.date.localeCompare(a.date));
  }
  function playerAttStats(team) {
    const stats={};
    team.players.forEach(p=>{ stats[p.id]=0; });
    teamHist(team).forEach(h=>{ h.ids.forEach(id=>{ if (stats[id]!==undefined) stats[id]++; }); });
    return stats;
  }
  function getMissedRecent(team) {
    const hist=teamHist(team);
    if (hist.length<2) return new Set();
    const recent=hist.slice(0,2);
    const missed=new Set();
    team.players.forEach(p=>{ if (recent.every(s=>!s.ids.includes(p.id))) missed.add(p.id); });
    return missed;
  }

  const attCount=attendees.size;
  const totalCount=selTeam ? selTeam.players.length : 0;
  const presentCfg=ALL_CFGS.find(c=>c.id===groupConfig);
  const gcMaxNum=gcTeams.length ? Math.max(gcTeams[0].length,gcTeams[1].length) : 0;

  return (
    <div className="app">
      <div className="orb1"/><div className="orb2"/>
      <input type="file" accept=".json" ref={importRef} style={{display:'none'}} onChange={onImport}/>
      <input type="file" accept=".json" ref={backupRef}  style={{display:'none'}} onChange={onImportBackup}/>

      {/* HOME */}
      {screen==='home' && <>
        <div className="hdr">
          <div className="hdr-logo">🏀</div>
          <div className="hdr-titles"><div className="hdr-title">Training Manager</div></div>
        </div>
        <div className="screen">
          <div className="screen-inner">
            {tab==='teams' && <>
              <div className="hero"><div className="hero-greeting">Ready to train?</div><div className="hero-title">Your <span className="hero-teal">Teams</span></div></div>
              <div className="action-row">
                <button className="action-btn" onClick={()=>importRef.current&&importRef.current.click()}>
                  <span className="action-icon">📥</span><div><div className="action-lbl">Import</div><div className="action-sub">From Squad Manager</div></div>
                </button>
                <button className="action-btn" onClick={onExport} disabled={!teams.length}>
                  <span className="action-icon">📤</span><div><div className="action-lbl">Export</div><div className="action-sub">To Squad Manager</div></div>
                </button>
              </div>
              <div className="sect">
                <div className="sect-lbl">Your Teams</div>
                {teams.length===0 ? (
                  <div className="empty"><div className="empty-icon">🏀</div><div className="empty-title">No Teams Yet</div><div className="empty-desc">Import from Squad Manager or create a new team.</div></div>
                ) : teams.map(team=>(
                  <div key={team.id} className="card team-card card-clickable" onClick={()=>openSession(team)}>
                    <div className="team-badge">{(team.ageBracket||'').replace(/[^0-9]/g,'')||'🏀'}</div>
                    <div className="team-info"><div className="team-name">{team.club}</div><div className="team-meta">{[team.league,team.season,team.ageBracket].filter(Boolean).join(' · ')}</div></div>
                    <div><div className="team-count">{team.players.length}</div><div className="team-count-lbl">Players</div></div>
                    <div className="team-arr">›</div>
                  </div>
                ))}
                <div style={{marginTop:14}}><button className="btn btn-secondary" style={{width:'100%'}} onClick={()=>setShowCreate(true)}>+ Create New Team</button></div>
              </div>
            </>}

            {tab==='history' && <>
              <div className="hero"><div className="hero-greeting">Track your progress</div><div className="hero-title">Attendance <span className="hero-teal">History</span></div></div>
              <div className="action-row">
                <button className="action-btn" onClick={exportBackup}>
                  <span className="action-icon">💾</span>
                  <div><div className="action-lbl">Backup</div><div className="action-sub">Save all data</div></div>
                </button>
                <button className="action-btn" onClick={()=>backupRef.current&&backupRef.current.click()}>
                  <span className="action-icon">📂</span>
                  <div><div className="action-lbl">Restore</div><div className="action-sub">From backup file</div></div>
                </button>
              </div>
              <div style={{padding:'0 20px 16px',fontSize:12,color:'var(--muted)',lineHeight:1.6}}>
                💡 Tap <strong style={{color:'var(--text)'}}>Backup</strong> before updating the app to save your history. Tap <strong style={{color:'var(--text)'}}>Restore</strong> after updating to bring it back.
              </div>
              {teams.length===0||teams.every(t=>!teamHist(t).length) ? (
                <div className="empty"><div className="empty-icon">📋</div><div className="empty-title">No History Yet</div><div className="empty-desc">Start a training session to begin tracking attendance.</div></div>
              ) : teams.map(team=>{
                const hist=teamHist(team);
                if (!hist.length) return null;
                const stats=playerAttStats(team);
                const missed=getMissedRecent(team);
                return (
                  <div key={team.id}>
                    <div className="sect" style={{marginBottom:10}}><div className="sect-lbl">{team.club}</div></div>
                    <div className="player-att-grid">
                      {team.players.map(p=>{
                        const cnt=stats[p.id]||0;
                        const isMissed=missed.has(p.id);
                        return (
                          <div key={p.id} className={'pac'+(isMissed?' missed':'')}>
                            <div className="pac-info">
                              <div className="pac-name">{p.nickname||p.firstName}</div>
                              <div className="pac-sub">{cnt} session{cnt!==1?'s':''}{isMissed?' · ⚠️ missed last 2':''}</div>
                            </div>
                            <div className={'pac-count'+(isMissed?' missed':'')}>{cnt}</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{padding:'0 20px'}}>
                      {hist.map(h=>(
                        <SwipeRow key={h.date} team={team} date={h.date} ids={h.ids} count={h.count} onDelete={()=>deleteSess(team.id,h.date)}/>
                      ))}
                    </div>
                  </div>
                );
              })}
            </>}
          </div>
        </div>
        <nav className="bot-nav">
          <button className={'nav-btn'+(tab==='teams'?' active':'')} onClick={()=>setTab('teams')}><span className="nav-icon">🏀</span><span className="nav-lbl">Teams</span></button>
          <button className={'nav-btn'+(tab==='history'?' active':'')} onClick={()=>setTab('history')}><span className="nav-icon">📋</span><span className="nav-lbl">History</span></button>
        </nav>
      </>}

      {/* SESSION */}
      {screen==='session' && selTeam && <>
        <div className="hdr">
          <button className="btn-back" onClick={()=>setScreen('home')}>‹</button>
          <div className="hdr-titles"><div className="hdr-title" style={{fontSize:16}}>{selTeam.club}</div><div className="hdr-sub">{[selTeam.league,selTeam.ageBracket].filter(Boolean).join(' · ')}</div></div>
          <button className={'btn '+(isSaved?'btn-saved':'btn-primary')} style={{height:36,fontSize:13,padding:'0 14px',minWidth:92}} onClick={saveAtt}>{isSaved?'✓ Saved':'💾 Save'}</button>
        </div>
        <div className="screen">
          <div className="screen-inner">
            <div className="date-row"><span style={{fontSize:17}}>📅</span><span className="date-lbl">Training Date</span><input type="date" value={sessionDate} onChange={e=>changeDate(e.target.value)}/></div>
            <div className="att-stats">
              <div className="att-stat"><div className="att-num">{attCount}</div><div className="att-lbl">Present</div></div>
              <div className="att-stat"><div className="att-num absent">{totalCount-attCount}</div><div className="att-lbl">Absent</div></div>
              <div className="att-stat"><div className="att-num total">{totalCount}</div><div className="att-lbl">Total</div></div>
            </div>
            <div className="sect">
              <div className="btn-row" style={{marginBottom:12}}>
                <button className="btn btn-ghost" onClick={()=>markAll(true)}>✓ All Present</button>
                <button className="btn btn-ghost" onClick={()=>markAll(false)}>✗ All Absent</button>
              </div>
              {/* Generate button — TOP */}
              <button className="btn btn-primary" style={{width:'100%',marginBottom:14}} onClick={goGroups}>Generate Groups →</button>
              {selTeam.players.map(player=>{
                const present=attendees.has(player.id);
                const pos=pPos(player,selTeam); const ovr=pOvr(player,selTeam);
                return (
                  <div key={player.id} className={'player-row '+(present?'present':'absent')} onClick={()=>togglePlayer(player.id)}>
                    <div className="p-num">#{player.singletNumber}</div>
                    <div className="p-info">
                      <div className="p-name">{player.nickname||player.firstName}</div>
                      <div className="p-meta"><span>{player.firstName} {player.lastName}</span>{pos!=='—'&&<span>· {pos}</span>}{ovr!==null&&<span>· OVR {ovr}</span>}</div>
                    </div>
                    <div className="p-check">{present&&<span className="check-tick">✓</span>}</div>
                  </div>
                );
              })}
              {/* Generate button — BOTTOM */}
              <div style={{marginTop:16}}><button className="btn btn-primary" style={{width:'100%'}} onClick={goGroups}>Generate Groups →</button></div>
            </div>
          </div>
        </div>
      </>}

      {/* GROUPS */}
      {screen==='groups' && selTeam && <>
        <div className="hdr">
          <button className="btn-back" onClick={()=>setScreen('session')}>‹</button>
          <div className="hdr-titles"><div className="hdr-title" style={{fontSize:16}}>Group Generator</div><div className="hdr-sub">{attCount} players · {selTeam.club}</div></div>
          <button className={'btn '+(isSaved?'btn-saved':'btn-secondary')} style={{height:36,fontSize:13,padding:'0 12px',minWidth:84}} onClick={saveAtt}>{isSaved?'✓ Saved':'💾 Save'}</button>
        </div>
        <div className="screen" ref={groupsRef}>
          <div className="screen-inner">
            <div className="cfg-section">
              <div className="sect-lbl" style={{padding:0,marginBottom:14}}>Group Type</div>
              <div className="cfg-row-label">All Players — by size</div>
              <div className="cfg-row" style={{marginBottom:12}}>
                {ALL_CONFIGS.map(c=>(
                  <button key={c.id} className={'cfg-btn'+(groupConfig===c.id?' active':'')} onClick={()=>onCfgChange(c.id)}>
                    <div className="cfg-num">{c.label}</div><div className="cfg-sub">{c.sub}</div>
                  </button>
                ))}
              </div>
              <div className="cfg-row-label">All Players — by count</div>
              <div className="cfg-row" style={{marginBottom:12}}>
                {NUM_CONFIGS.map(c=>(
                  <button key={c.id} className={'cfg-btn'+(groupConfig===c.id?' active':'')} onClick={()=>onCfgChange(c.id)}>
                    <div className="cfg-num">{c.label}</div><div className="cfg-sub">{c.sub}</div>
                  </button>
                ))}
              </div>
              <div className="cfg-row-label">Single Group</div>
              <div className="cfg-row">
                {ONE_CONFIGS.map(c=>(
                  <button key={c.id} className={'cfg-btn'+(groupConfig===c.id?' active':'')} onClick={()=>onCfgChange(c.id)}>
                    <div className="cfg-num">{c.label}</div><div className="cfg-sub">{c.sub}</div>
                  </button>
                ))}
              </div>
            </div>
            <div className="sect" style={{marginBottom:10}}><div className="sect-lbl">Group Method</div></div>
            <div className="mode-row">
              {MODES.map(m=>{ const Icon=MODE_ICONS[m.id]; return (
                <button key={m.id} className={'mode-card'+(groupMode===m.id?' active':'')} onClick={()=>onModeChange(m.id)}>
                  {React.createElement(Icon)}<div className="mode-lbl">{m.label}</div>
                </button>
              ); })}
            </div>
            <div style={{padding:'0 20px',marginBottom:10}}>
              <button className="btn btn-primary" style={{width:'100%',marginBottom:10}} onClick={()=>genGroups()}>{groups.length?'🔄 Regenerate Groups':'⚡ Generate Groups'}</button>
              <button className="btn btn-gold" style={{width:'100%'}} onClick={goGoldenChild}><img src={NUMBERS_ICON} style={{width:'24px',height:'24px',objectFit:'contain',borderRadius:'5px',marginRight:'6px',verticalAlign:'middle'}}/> Numbers</button>
            </div>
            {/* Timer buttons */}
            <div className="timer-section">
              <div className="sect-lbl" style={{padding:0,marginBottom:12}}>⏱ Drill Timer</div>
              <div className="timer-row">
                {[[30,'30','Secs'],[45,'45','Secs'],[60,'60','Secs']].map(([s,n,u])=>(
                  <button key={s} className="timer-btn" onClick={()=>openTimer(s)}>
                    <div className="timer-btn-num">{n}</div>
                    <div className="timer-btn-unit">{u}</div>
                  </button>
                ))}
              </div>
              <div className="timer-row">
                {[[120,'2','Mins'],[180,'3','Mins'],[300,'5','Mins']].map(([s,n,u])=>(
                  <button key={s} className="timer-btn" onClick={()=>openTimer(s)}>
                    <div className="timer-btn-num">{n}</div>
                    <div className="timer-btn-unit">{u}</div>
                  </button>
                ))}
              </div>
            </div>
            {groups.length===0 ? (
              <div className="gen-empty"><div className="gen-empty-icon">⚡</div><div className="gen-empty-title">Ready to generate</div><div className="gen-empty-sub">Pick type and method above,<br/>then tap Generate Groups</div></div>
            ) : <>
              <div className="sect" style={{marginBottom:12}}><div className="sect-lbl">{groups.length} Group{groups.length!==1?'s':''} · {presentCfg&&presentCfg.full}</div></div>
              <div className="groups-list">
                {groups.map((group,gi)=>(
                  <div key={gi} className="group-card" style={{animationDelay:(gi*55)+'ms'}}>
                    <div className="group-hdr"><span className="group-num" style={{color:GROUP_COLORS[gi%GROUP_COLORS.length]}}>Group {gi+1}</span><span className="group-sz">{group.length} player{group.length!==1?'s':''}</span></div>
                    <div className="group-players">
                      {group.map((player,pi)=>{ const color=CHIP_COLORS[(gi*5+pi)%CHIP_COLORS.length]; const pos=pPos(player,selTeam); return (
                        <div key={player.id} className="p-chip">
                          <div className="chip-dot" style={{background:color}}/>
                          <span className="chip-num">#{player.singletNumber}</span>
                          <span className="chip-name">{player.nickname||player.firstName}</span>
                          {pos!=='—'&&<span className="chip-pos">{pos}</span>}
                        </div>
                      ); })}
                    </div>
                  </div>
                ))}
              </div>
            </>}
          </div>
        </div>
      </>}

      {/* GOLDEN CHILD */}
      {screen==='golden' && selTeam && gcTeams.length===2 && <>
        <div className="hdr">
          <button className="btn-back" onClick={()=>setScreen('groups')}>‹</button>
          <div className="hdr-titles"><div className="hdr-title" style={{fontSize:16}}><img src={NUMBERS_ICON} style={{width:'20px',height:'20px',objectFit:'contain',borderRadius:'4px',verticalAlign:'middle',marginRight:'6px'}}/> Numbers</div><div className="hdr-sub">{(gcTeams[0].length+gcTeams[1].length)+' players · '+selTeam.club}</div></div>
        </div>
        <div className="screen">
          <div className="screen-inner">
            <div className="gc-teams">
              {gcTeams.map((team,ti)=>{
                const [col,bg,bdr]=TEAM_COLS[ti];
                return (
                  <div key={ti} className="gc-team" style={{border:'1.5px solid '+bdr}}>
                    <div className="gc-team-hdr" style={{background:bg}}>
                      <span className="gc-team-name" style={{color:col}}>Team {ti===0?'A':'B'}</span>
                      <span style={{fontSize:11,color:'var(--muted)'}}>{team.length}</span>
                    </div>
                    <div className="gc-players">
                      {team.map((player,pi)=>{
                        const num=pi+1;
                        const smallerTeamIdx = gcTeams[0].length <= gcTeams[1].length ? 0 : 1;
                        const isExtra = ti===smallerTeamIdx && gcTeams[0].length!==gcTeams[1].length && pi===team.length-1;
                        const extraNum = Math.max(gcTeams[0].length, gcTeams[1].length);
                        const isLit=gcDraw&&(gcDraw.includes(num)||(isExtra&&gcDraw.includes(extraNum)));
                        return (
                          <div key={player.id} className="gc-prow" style={{opacity:gcDraw&&!isLit?0.3:1}}>
                            <div className="gc-badge" style={{color:isLit?col:'var(--muted)'}}>{isExtra?(extraNum+'/'+num):''+num}</div>
                            <div className="gc-pname" style={{color:isLit?col:'var(--text)'}}>{player.nickname||player.firstName}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{padding:'0 20px',marginBottom:20}}>
              <button className="btn btn-gold" style={{width:'100%',height:58,fontSize:18,letterSpacing:'2px',marginBottom:32}} onClick={gcDraw_}>{gcDraw?'🔄 Draw Again':'🎲 Draw Numbers'}</button>
              <button className="btn btn-ghost" style={{width:'100%',height:32,fontSize:11,opacity:0.5}} onClick={goGoldenChild}>🔀 reshuffle teams</button>
            </div>
            {gcDraw && (
              <div className="gc-result">
                <div className="gc-result-lbl">{gcDraw.length===gcMaxNum?'All players play!':gcDraw.length===1?'This number plays:':'These numbers play:'}</div>
                <div className="gc-result-nums">
                  {gcDraw.map(n=>(
                    <div key={n} className="gc-result-num" style={{color:CHIP_COLORS[n%CHIP_COLORS.length]}}>{n}</div>
                  ))}
                </div>
                <div className="gc-result-sub">Player{gcDraw.length>1?'s':''} #{gcDraw.join(' & #')} from each team step on court</div>
              </div>
            )}
          </div>
        </div>
      </>}

      {/* TIMER OVERLAY */}
      {timerSecs !== null && (()=>{
        const total = timerSecs;
        const left = timerLeft;
        const pct = left / total;
        const r = 110;
        const circ = 2 * Math.PI * r;
        const dash = pct * circ;
        const isLast10 = left <= 10 && left > 0;
        const isDone = left === 0;
        const strokeColor = isDone ? '#22C55E' : isLast10 ? '#EF4444' : '#38BDF8';
        return (
          <div className="timer-overlay">
            <div className="timer-label">{TIMER_LABELS[total]} Timer</div>
            <div className="timer-display">
              <svg className="timer-ring" viewBox="0 0 260 260">
                <circle className="timer-ring-bg" cx="130" cy="130" r={r}/>
                <circle className="timer-ring-fg"
                  cx="130" cy="130" r={r}
                  strokeDasharray={circ}
                  strokeDashoffset={circ - dash}
                  stroke={strokeColor}/>
              </svg>
              <div className={'timer-time'+(isLast10&&!isDone?' last10':'')+(isDone?' timer-done':'')}>
                {isDone ? '🏁' : fmtTime(left)}
              </div>
            </div>
            <div className="timer-announce">{timerAnnounce}</div>
            <div className="timer-controls">
              <button className="timer-ctrl restart" onClick={restartTimer} title="Restart">↺</button>
              {isDone ? (
                <button className="timer-ctrl play" style={{background:'linear-gradient(135deg,#4ADE80,#15803D)'}} onClick={closeTimer}>✓</button>
              ) : (
                <button className="timer-ctrl play" onClick={()=>setTimerRunning(r=>!r)}>
                  {timerRunning ? '⏸' : '▶'}
                </button>
              )}
              <button className="timer-ctrl stop" onClick={closeTimer} title="Close">✕</button>
            </div>
          </div>
        );
      })()}

      {/* CREATE TEAM MODAL */}
      {showCreate && (
        <div className="modal-bg" onClick={e=>{ if(e.target===e.currentTarget) setShowCreate(false); }}>
          <div className="modal-sheet">
            <div className="modal-handle"/>
            <div className="modal-title">Create New Team</div>
            <div className="form-grp"><label className="form-lbl">Club Name *</label><input className="form-input" placeholder="e.g. Collingwood All Stars" value={newTeam.club} onChange={e=>setNewTeam(t=>Object.assign({},t,{club:e.target.value}))}/></div>
            <div className="form-row">
              <div className="form-grp"><label className="form-lbl">League</label><input className="form-input" placeholder="e.g. EDJBL" value={newTeam.league} onChange={e=>setNewTeam(t=>Object.assign({},t,{league:e.target.value}))}/></div>
              <div className="form-grp"><label className="form-lbl">Age Bracket</label><input className="form-input" placeholder="e.g. U12" value={newTeam.ageBracket} onChange={e=>setNewTeam(t=>Object.assign({},t,{ageBracket:e.target.value}))}/></div>
            </div>
            <div className="form-row">
              <div className="form-grp"><label className="form-lbl">Season</label><input className="form-input" placeholder="e.g. Summer25/26" value={newTeam.season} onChange={e=>setNewTeam(t=>Object.assign({},t,{season:e.target.value}))}/></div>
              <div className="form-grp"><label className="form-lbl">Year</label><input className="form-input" placeholder="2026" value={newTeam.year} onChange={e=>setNewTeam(t=>Object.assign({},t,{year:e.target.value}))}/></div>
            </div>
            <div className="divider"/>
            <label className="form-lbl" style={{marginBottom:10,display:'block'}}>Players</label>
            {newTeam.players.length>0 && (
              <div className="players-mini">
                {newTeam.players.map(p=>(
                  <div key={p.id} className="mini-chip" onClick={()=>setNewTeam(t=>Object.assign({},t,{players:t.players.filter(x=>x.id!==p.id)}))}>
                    <span className="mini-num">#{p.singletNumber}</span><span>{p.nickname}</span><span style={{color:'var(--muted)',marginLeft:2,fontSize:10}}>✕</span>
                  </div>
                ))}
              </div>
            )}
            <div className="form-row" style={{marginBottom:10}}>
              <div className="form-grp"><label className="form-lbl">Player Name</label><input className="form-input" placeholder="First Last" value={npName} onChange={e=>setNpName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addPlayer()}/></div>
              <div className="form-grp" style={{maxWidth:88}}><label className="form-lbl">Number</label><input className="form-input" placeholder="#" value={npNum} onChange={e=>setNpNum(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addPlayer()}/></div>
            </div>
            <button className="btn btn-secondary" style={{width:'100%',marginBottom:20}} onClick={addPlayer}>+ Add Player</button>
            <div className="btn-row">
              <button className="btn btn-secondary" style={{flex:1}} onClick={()=>setShowCreate(false)}>Cancel</button>
              <button className="btn btn-primary" style={{flex:2}} onClick={createTeam}>Create Team</button>
            </div>
          </div>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
